<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1ack</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta property="og:title" content="B1ack">
    <meta property="og:description" content="Calmness always here">
    <meta property="og:image" content="https://b1ack.net/favicon.svg">
    <meta property="og:url" content="https://b1ack.net/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="alternate" hreflang="en" href="https://b1ack.net/en">
    <link rel="alternate" hreflang="ru" href="https://b1ack.net/ru">
    <link rel="alternate" hreflang="de" href="https://b1ack.net/de">
    <link rel="alternate" hreflang="fr" href="https://b1ack.net/fr">
    <link rel="alternate" hreflang="ka" href="https://b1ack.net/ge">
    <link rel="alternate" hreflang="x-default" href="https://b1ack.net/">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "B1ack",
      "url": "https://b1ack.net/",
      "description": "Calmness always here"
    }
    </script>
    <script>
        (function() {
            const savedLang = localStorage.getItem('b1ack-lang');
            const userLang = (navigator.language || navigator.userLanguage).toLowerCase().split('-')[0];
            let targetPath = '/en';
            const langMap = { 'de': '/de', 'fr': '/fr', 'ka': '/ge', 'ge': '/ge', 'ru': '/ru' };
            if (savedLang && langMap[savedLang]) targetPath = langMap[savedLang];
            else if (langMap[userLang]) targetPath = langMap[userLang];
            window.location.replace(targetPath);
        })();
    </script>
</head>
