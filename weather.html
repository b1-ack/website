<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1ack</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/img/icons/weather.svg">
    <meta property="og:title" content="B1ack">
    <meta property="og:description" content="Check the weather forecast for any city in the world.">
    <meta property="og:image" content="https://b1ack.net/img/icons/weather.svg">
    <meta property="og:url" content="https://b1ack.net/weather">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
<script>
        (function() {
            const savedLang = localStorage.getItem('b1ack-lang');
            const userLang = (navigator.language || navigator.userLanguage).toLowerCase().split('-')[0];
            let targetPath = '/en/weather';
            const langMap = { 'de': '/de/weather', 'fr': '/fr/weather', 'ka': '/ge/weather', 'ge': '/ge/weather', 'ru': '/ru/weather' };
            if (savedLang && langMap[savedLang]) targetPath = langMap[savedLang];
            else if (langMap[userLang]) targetPath = langMap[userLang];
            window.location.replace(targetPath);
        })();
    </script>
</head>
</html>
