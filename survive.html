<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1ack - Survive</title>
    <meta name="description" content="Calmness always here">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --text-color: #f5f5f5;
            --header-bg: rgba(10, 10, 10, 0.9);
            --accent-color: rgba(255, 255, 255, 0.08);
            --accent-hover: rgba(255, 255, 255, 0.15);
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(15, 15, 15, 0.8);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        [data-theme="light"] {
            --bg-color: #fafafa;
            --text-color: #111827;
            --header-bg: rgba(249, 250, 251, 0.9);
            --accent-color: rgba(0, 0, 0, 0.05);
            --accent-hover: rgba(0, 0, 0, 0.1);
            --border-color: rgba(0, 0, 0, 0.08);
            --card-bg: rgba(255, 255, 255, 0.9);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
            position: relative;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-color);
            flex-shrink: 0;
            transition: var(--transition);
        }
        .logo:hover {
            opacity: 0.9;
        }
        .logo img {
            width: 32px;
            height: 32px;
            filter: brightness(0) invert(1);
        }
        [data-theme="light"] .logo img {
            filter: brightness(0);
        }
        @font-face {
            font-family: 'B1ackFont';
            src: url('font.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        .logo-text {
            font-family: 'B1ackFont', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .nav {
            display: none;
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .nav.active {
            display: flex;
        }
        .nav-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            transition: var(--transition);
            font-weight: 500;
            text-align: center;
            font-size: 0.95rem;
            border: 1px solid transparent;
        }
        .nav-link:hover {
            background: var(--accent-color);
            border-color: var(--border-color);
        }
        .nav-link.active {
            background: var(--accent-color);
            border-color: var(--border-color);
        }
        @media (min-width: 768px) {
            .nav {
                position: static;
                display: flex;
                flex-direction: row;
                padding: 0;
                background: none;
                border: none;
                backdrop-filter: none;
                gap: 8px;
                box-shadow: none;
            }
            .nav-link {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
            text-decoration: none;
            box-shadow: var(--shadow-sm);
        }
        .control-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }
        .control-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .theme-img {
            filter: brightness(0) invert(1);
        }
        [data-theme="light"] .theme-img {
            filter: brightness(0);
        }
        @media (min-width: 768px) {
            .control-btn {
                width: 40px;
                height: 40px;
            }
        }
        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 8px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: var(--text-color);
            transition: var(--transition);
            border-radius: 1px;
        }
        @media (min-width: 768px) {
            .menu-toggle {
                display: none;
            }
        }
        main {
            padding-top: 80px;
            min-height: calc(100vh - 60px);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.5;
        }
        .survive-container {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }
        .survive-title {
            font-family: 'B1ackFont', sans-serif;
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        .survive-text {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            max-width: 600px;
            margin: 0 auto;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
            line-height: 1.8;
        }
        [data-theme="light"] .survive-title,
        [data-theme="light"] .survive-text {
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">
                <img src="img/b1ack.svg" alt="B1ack Logo">
                <span class="logo-text">B1ack</span>
            </a>

            <nav class="nav" id="nav">
                <a href="/" class="nav-link" data-lang="ru">Главная</a>
                <a href="/" class="nav-link" data-lang="en">Home</a>
                <a href="https://os.b1ack.net" class="nav-link" data-lang="ru">Система</a>
                <a href="https://os.b1ack.net" class="nav-link" data-lang="en">System</a>
                <a href="https://wiki.b1ack.net" class="nav-link" data-lang="ru">Документация</a>
                <a href="https://wiki.b1ack.net" class="nav-link" data-lang="en">Documentation</a>
                <a href="/fingerprint" class="nav-link" data-lang="ru">Отпечаток</a>
                <a href="/fingerprint" class="nav-link" data-lang="en">Fingerprint</a>
                <a href="/generator" class="nav-link" data-lang="ru">Генератор</a>
                <a href="/generator" class="nav-link" data-lang="en">Generator</a>
            </nav>

            <div class="controls">
                <button class="control-btn" id="theme-toggle" title="">
                    <img class="theme-icon theme-img" src="img/icons/dark.png" alt="Theme">
                </button>
                <button class="control-btn" id="lang-toggle" title="">
                    <img class="lang-icon" src="img/icons/ru.png" alt="Language">
                </button>
                <a href="https://liberapay.com/B1ack/donate" class="control-btn" title=""><img class="theme-img" src="https://liberapay.com/assets/liberapay/icon-v2_black.200.png" alt="Donate"></a>
                <button class="menu-toggle" id="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="survive-container">
            <h1 class="survive-title" data-lang="ru">Живи</h1>
            <h1 class="survive-title" data-lang="en">Survive</h1>
            <p class="survive-text" data-lang="ru">Каждый день — это битва. Но ты сильнее, чем думаешь.</p>
            <p class="survive-text" data-lang="en">Every day is a battle. But you're stronger than you think.</p>
        </div>
    </main>
    <img class="bg-image" src="img/golden-gate-bridge.png" alt="Golden Gate Bridge">

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');
        const menuToggle = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav');
        const themeIcon = themeToggle.querySelector('.theme-icon');
        const langIcon = langToggle.querySelector('.lang-icon');

        document.addEventListener('DOMContentLoaded', () => {
            const systemTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            const savedTheme = localStorage.getItem('theme') || systemTheme;
            setTheme(savedTheme);

            const systemLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
            const savedLang = localStorage.getItem('lang') || systemLang;
            setLanguage(savedLang);

            menuToggle.addEventListener('click', () => {
                nav.classList.toggle('active');
            });
        });

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeIcon.src = theme === 'dark' ? 'img/icons/dark.png' : 'img/icons/light.png';
        }

        langToggle.addEventListener('click', () => {
            const currentLang = document.documentElement.getAttribute('data-lang') || 'ru';
            const newLang = currentLang === 'ru' ? 'en' : 'ru';
            setLanguage(newLang);
            localStorage.setItem('lang', newLang);
        });

        function setLanguage(lang) {
            document.documentElement.setAttribute('data-lang', lang);
            langIcon.src = lang === 'ru' ? 'img/icons/ru.png' : 'img/icons/en.png';
            
            document.querySelectorAll('[data-lang]').forEach(el => {
                el.style.display = el.getAttribute('data-lang') === lang ? '' : 'none';
            });
        }

        document.addEventListener('click', (e) => {
            if (!nav.contains(e.target) && !menuToggle.contains(e.target)) {
                nav.classList.remove('active');
            }
        });
    </script>
</body>
</html>
