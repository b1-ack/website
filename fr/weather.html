<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1ack - Météo</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../css/weather.css">
    <meta property="og:title" content="B1ack">
    <meta property="og:description" content="Consultez les prévisions météo pour n'importe quelle ville.">
    <meta name="description" content="Consultez les prévisions météo pour n'importe quelle ville.">
    <meta property="og:image" content="https://b1ack.net/favicon.svg">
    <meta property="og:url" content="https://b1ack.net/fr/weather">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="alternate" hreflang="en" href="https://b1ack.net/en/weather">
    <link rel="alternate" hreflang="ru" href="https://b1ack.net/ru/weather">
    <link rel="alternate" hreflang="de" href="https://b1ack.net/de/weather">
    <link rel="alternate" hreflang="fr" href="https://b1ack.net/fr/weather">
    <link rel="alternate" hreflang="ka" href="https://b1ack.net/ge/weather">
    <link rel="alternate" hreflang="x-default" href="https://b1ack.net/weather">
    <link rel="canonical" href="https://b1ack.net/fr/weather">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "B1ack",
      "url": "https://b1ack.net/fr/weather",
      "description": "Calme toujours ici",
      "isPartOf": {"@type": "WebSite", "url": "https://b1ack.net/fr"}
    }
    </script>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="." class="logo"><img src="../img/b1ack.svg" alt="B1ack Logo"><span class="logo-text">B1ack</span></a>
            <nav class="nav" id="nav">
                <div class="nav-lang-bar">
                    <a href="/en/weather" class="nav-lang-btn"><img src="../img/icons/en.png" alt="en"></a>
                    <a href="/ru/weather" class="nav-lang-btn"><img src="../img/icons/ru.png" alt="ru"></a>
                    <a href="/de/weather" class="nav-lang-btn"><img src="../img/icons/de.png" alt="de"></a>
                    <a href="/fr/weather" class="nav-lang-btn active"><img src="../img/icons/fr.png" alt="fr"></a>
                    <a href="/ge/weather" class="nav-lang-btn"><img src="../img/icons/ge.png" alt="ge"></a>
                </div>
                <a href="." class="nav-link">Accueil</a>
                <a href="https://os.b1ack.net/fr" class="nav-link">Système</a>
                <a href="https://wiki.b1ack.net" class="nav-link">Documentation</a>
                <div class="nav-more" id="nav-more">
                    <button class="nav-more-toggle" id="nav-more-toggle" aria-label="Plus">
                        <svg class="more-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="nav-more-menu" id="nav-more-menu">
                        <div class="nav-more-header-section">
                            <a href="weather" class="nav-link active">Météo</a>
                            <a href="fingerprint" class="nav-link">Empreinte</a>
                            <a href="generator" class="nav-link">Générateur</a>
                        </div>
                        <div class="nav-more-body-section">
                            <div class="nav-more-grid">
                                <a href="weather" class="nav-link active">Météo</a>
                                <a href="fingerprint" class="nav-link">Empreinte</a>
                                <a href="generator" class="nav-link">Générateur</a>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="donate" class="nav-link donate-link">Don</a>
            </nav>
            <div class="controls">
                <button class="control-btn" id="theme-toggle"><img class="theme-icon theme-img" id="theme-icon" src="../img/icons/dark.png" alt="Theme"></button>
                <div class="lang-dropdown">
                    <button class="control-btn lang-dropdown-btn" id="lang-toggle">
                        <img class="lang-icon" id="lang-icon" src="../img/icons/fr.png" alt="Language">
                    </button>
                    <div class="lang-dropdown-menu" id="lang-dropdown-menu">
                        <button class="lang-dropdown-item" data-lang="en"><img src="../img/icons/en.png" alt="en"><span class="lang-name">English</span><span class="lang-check">✓</span></button>
                        <button class="lang-dropdown-item" data-lang="ru"><img src="../img/icons/ru.png" alt="ru"><span class="lang-name">Русский</span><span class="lang-check">✓</span></button>
                        <button class="lang-dropdown-item" data-lang="de"><img src="../img/icons/de.png" alt="de"><span class="lang-name">Deutsch</span><span class="lang-check">✓</span></button>
                        <button class="lang-dropdown-item active" data-lang="fr"><img src="../img/icons/fr.png" alt="fr"><span class="lang-name">Français</span><span class="lang-check">✓</span></button>
                        <button class="lang-dropdown-item" data-lang="ge"><img src="../img/icons/ge.png" alt="ge"><span class="lang-name">ქართული</span><span class="lang-check">✓</span></button>
                    </div>
                </div>
                <a href="donate" class="control-btn"><img class="theme-img" src="../img/icons/donate.png" alt="Donate"></a>
                <button class="menu-toggle" id="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>
    <main>
        <div id="cookie-consent" class="cookie-consent">
            <h3><span class="cookie-dot"></span>Cookies</h3>
            <p>Nous ne collectons ni ne stockons vos cookies.</p>
            <button class="cookie-btn" onclick="acceptCookies()">Accepter</button>
        </div>
        <div class="container" id="app">
            <div class="wloc-initial" id="wloc-initial">
                <div class="wloc-prompt">Choisir un lieu</div>
                <div class="wloc-center">
                    <div id="wloc" class="wloc-bar">
                        <div class="wloc-input-wrap">
                            <input class="wloc-input" id="wloc-input" type="text" placeholder="Rechercher une ville..." autocomplete="off">
                            <button class="wloc-clear" id="wloc-clear">&times;</button>
                            <div class="wloc-autocomplete" id="wloc-ac"></div>
                        </div>
                        <button class="wloc-btn" id="wloc-detect">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
                            Détecter
                        </button>
                    </div>
                    <div class="wproviders">Fournisseur météo: Open-Meteo</div>
                    <div class="wunits" id="wunits">
                        <div class="wunits-group">
                            <span class="wunits-label">Température</span>
                            <div class="wunits-btns" data-unit="temperature">
                                <button class="active" data-value="c">&deg;C</button>
                                <button data-value="f">&deg;F</button>
                            </div>
                        </div>
                        <div class="wunits-group">
                            <span class="wunits-label">Vent</span>
                            <div class="wunits-btns" data-unit="speed">
                                <button class="active" data-value="kmh">km/h</button>
                                <button data-value="mph">mph</button>
                            </div>
                        </div>
                        <div class="wunits-group">
                            <span class="wunits-label">Précipitations</span>
                            <div class="wunits-btns" data-unit="precipitation">
                                <button class="active" data-value="mm">mm</button>
                                <button data-value="in">po</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="wcontent" style="display:none;"></div>
        </div>
    </main>
    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <a href="https://www.gnu.org/licenses/gpl-3.0-standalone.html"><img src="https://b1ack.net/img/gplv3-or-later.png" alt="GPLv3" width="88" height="31" loading="lazy"></a>
            </div>
            <div class="footer-center">
                <a href="mailto:support@b1ack.net">support@b1ack.net</a>
                <a href="https://github.com/b1-ack" target="_blank" rel="noopener">GitHub</a>
                <a href="https://discord.gg/NxZEbtEhAp" target="_blank" rel="noopener">Discord</a>
                <a href="https://t.me/B1ackOS" target="_blank" rel="noopener">Telegram</a>
            </div>
            <div class="footer-right">
                <a href="https://www.gnu.org/licenses/fdl-1.3.en.html" title="GNU Free Documentation License">
                    <img src="https://b1ack.net/img/gfdl-logo-tiny.png" alt="GFDL" style="height: 24px;">
                </a>
            </div>
        </div>
    </footer>
    <script src="../js/weather.js"></script>
</body>
</html>
